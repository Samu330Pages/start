<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Subway Surfers Game</title>
    <link rel="icon" href="img/FirstAvatar.png">

    <base href="https://cdn.jsdelivr.net/gh/bubbls/subwaysurfersmerge/">

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <script src="4399.ss.js"></script>

    <script>
        // =========================================================================
        // Modo escritorio ---- By Samu330 ☠️
        // =========================================================================
        (function() {
            const desktopUserAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            try {
                Object.defineProperty(navigator, 'userAgent', { get: function() { return desktopUserAgent; } });
                Object.defineProperty(navigator, 'appVersion', { get: function() { return desktopUserAgent; } });
                Object.defineProperty(navigator, 'platform', { get: function() { return 'Win32'; } });
            } catch (e) {
                navigator.__defineGetter__('userAgent', function() { return desktopUserAgent; });
                navigator.__defineGetter__('appVersion', function() { return desktopUserAgent; });
                navigator.__defineGetter__('platform', function() { return 'Win32'; });
            }

            const originalAlert = window.alert;
            window.alert = function(msg) {
                if (msg && (msg.indexOf("WebGL") !== -1 || msg.indexOf("mobile") !== -1 || msg.indexOf("browser") !== -1 || msg.indexOf("support") !== -1)) {
                    console.log("Bloqueo de compatibilidad móvil evitado con éxito:", msg);
                    return;
                }
                return originalAlert(msg);
            };
        })();
        // =========================================================================
        window.config = {
            loader: "unity",
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,
            title: "Subway Surfers: Mexico",
            unityVersion: "2019.1.18f1",
            unityWebglBuildUrl: "Mexico3.json",
            fileSize: 26,
            cachedDecompressedFileSizes: {
                'Mexico3.asm.framework.unityweb':468854,
                'Mexico3.wasm.framework.unityweb':461752,
                'Mexico3.asm.memory.unityweb':3571439,
                'Mexico3.wasm.code.unityweb':26475089,
                'Mexico3.data.unityweb':28424271,
                'Mexico3.asm.code.unityweb':67572966,
            }
        };

        window.mergedBlobUrls = {};
        window.assetsReady = true;

        async function mergeSplitFile(fileUrlBase, numParts = 2) {
            const partUrls = Array.from(
                { length: numParts },
                (_, i) => `${fileUrlBase}.part${i + 1}`
            );

            try {
                const responses = await Promise.all(
                    partUrls.map(url => fetch(url))
                );

                if (responses.some(r => !r.ok)) {
                    return null;
                }

                const parts = await Promise.all(
                    responses.map(r => r.arrayBuffer())
                );

                const combinedBlob = new Blob(parts, {
                    type: "application/octet-stream"
                });

                return URL.createObjectURL(combinedBlob);

            } catch (error) {
                return null;
            }
        }

        function setupXHRInterceptor() {
            if (window.xhrInterceptorInstalled) {
                return;
            }

            const originalOpen = XMLHttpRequest.prototype.open;
            const originalSend = XMLHttpRequest.prototype.send;

            XMLHttpRequest.prototype.open = function (method, url, ...args) {
                this._url = url;
                this._method = method;
                this._args = args;

                let finalUrl = url;

                for (const [filename, blobUrl] of Object.entries(window.mergedBlobUrls)) {
                    if (url.includes(filename)) {
                        finalUrl = blobUrl;
                        break;
                    }
                }

                return originalOpen.call(
                    this,
                    method,
                    finalUrl,
                    ...args
                );
            };

            XMLHttpRequest.prototype.send = function (...args) {
                const xhr = this;

                if (!window.assetsReady) {
                    const checkReady = setInterval(() => {
                        if (window.assetsReady) {
                            clearInterval(checkReady);
                            originalSend.apply(xhr, args);
                        }
                    }, 50);

                    return;
                }

                return originalSend.apply(this, args);
            };

            window.xhrInterceptorInstalled = true;
        }

        async function prepareGameAssets() {
            try {
                window.assetsReady = false;
                delete window.xhrInterceptorInstalled;
                window.mergedBlobUrls = {};

                setupXHRInterceptor();

                const filesToMerge = [
                    "Mexico3.data.unityweb",
                    "Mexico3.wasm.code.unityweb"
                ];

                for (const filename of filesToMerge) {
                    const blobUrl = await mergeSplitFile(filename, 2);

                    if (blobUrl) {
                        window.mergedBlobUrls[filename] = blobUrl;
                    }
                }

                window.assetsPrepared = true;
                window.assetsReady = true;

            } catch (error) {
                window.assetsPrepared = false;
                window.assetsReady = true;
            }
        }

        prepareGameAssets();
    </script>
</head>

<body>

    <script src="master-loader.js"></script>

    <script>
        function toggleFullscreen() {
            const elem = document.documentElement;

            if (!document.fullscreenElement) {

                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }

            } else {

                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        document.addEventListener("keydown", function (event) {
            if (event.key === "f" || event.key === "F") {
                toggleFullscreen();
            }
        });
    </script>

</body>
</html>
