<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Más Juegos Web</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1e1233 0%, #0f081d 100%);
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        a.game-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .logo-animation {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: pulse 2s infinite alternate;
            letter-spacing: 2px;
        }

        .disclaimer-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff007f;
            padding: 15px 20px;
            max-width: 700px;
            margin: 0 auto;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .disclaimer-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: #ff007f;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .disclaimer-text {
            font-size: 0.85rem;
            color: #ccc;
            font-style: italic;
            line-height: 1.4;
        }

        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #7f00ff;
            box-shadow: 0 12px 20px rgba(127, 0, 255, 0.3);
        }

        .game-image-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            background-color: #2a1b4e;
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .game-card:hover .game-image {
            transform: scale(1.1);
        }

        .game-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.13) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .game-card:hover::after {
            left: 125%;
        }

        .game-info {
            padding: 15px;
            text-align: center;
            background: linear-gradient(to top, rgba(15, 8, 29, 0.9), rgba(15, 8, 29, 0.4));
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 8, 29, 0.9);
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(127, 0, 255, 0.2);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 999;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.3rem;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .whatsapp { background-color: #25D366; }
        .facebook { background-color: #1877F2; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .tiktok { background-color: #000000; border: 1px solid rgba(255,255,255,0.2); }

        .social-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 15px rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,0,127,0.5)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 15px rgba(127,0,255,0.8)); }
        }

        @media (max-width: 600px) {
            .logo-animation { font-size: 1.8rem; }
            .games-container { gap: 15px; padding: 0 15px; }
            .game-image-wrapper { height: 140px; }
            .game-title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-animation">Sm330 Games</div>
        
        <div class="disclaimer-box">
            <div class="disclaimer-title">DISCLAIMER:</div>
            <div class="disclaimer-text">
                All these games’ rights go to their respective owners I do not claim to own any of these games
            </div>
        </div>
    </header>

    <main class="games-container">
        
        <a href="/games/coreball/" class="game-link">
            <div class="game-card">
                <div class="game-image-wrapper">
                    <img src="/games/assets/coreball.png" alt="core ball" class="game-image">
                </div>
                <div class="game-info">
                    <h3 class="game-title">Core Ball</h3>
                </div>
            </div>
        </a>

    </main>

    <footer>
        <a href="https://wa.me/5219984907794" target="_blank" class="social-btn whatsapp" title="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
        <a href="https://facebook.com/sm330.io" target="_blank" class="social-btn facebook" title="Facebook">
            <i class="fab fa-facebook-f"></i>
        </a>
        <a href="https://instagram.com/sm330.io" target="_blank" class="social-btn instagram" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://tiktok.com/@samu330ofc3" target="_blank" class="social-btn tiktok" title="TikTok">
            <i class="fab fa-tiktok"></i>
        </a>
    </footer>

    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        document.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) || 
                (e.ctrlKey && (e.key === 'U' || e.key === 'u'))
            ) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
