<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvO</title>
    <link rel="icon" href="https://raw.githubusercontent.com/Samu330Pages/start/refs/heads/main/games/more/games/ovo/ovo_icon.jpg">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="gameFrame"></iframe>

    <script>
        fetch('ovo/ovo.html') 
            .then(response => response.text())
            .then(html => {
                const blob = new Blob([html], { type: 'text/html' });
                const blobURL = URL.createObjectURL(blob);
                document.getElementById('gameFrame').src = blobURL;
            })
            .catch(err => console.error("Error al burlar origen:", err));
    </script>
</body>
</html>
