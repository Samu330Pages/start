<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samu330 Web</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <style>
        :root {
            --bg-img: url('https://images-ng.pixai.art/gi/orig/c6e93e74-48ab-4d16-a93c-cf5c5a0f68cd');
            --card-bg: rgba(255, 255, 255, 0.15);
            --text-color: black;
            --leng-bkg: rgba(250, 250, 250, 0.8);
        }
        .dark-theme {
            --bg-img: url('https://www.xtrafondos.com/wallpapers/castorice-de-juego-honkai-star-rail-14026.jpg');
            --card-bg: rgba(0, 0, 0, 0.4);
            --text-color: #f0f0f0;
            --leng-bkg: rgba(0, 0, 0, 0.8)
        }

        body { margin: 0; font-family: sans-serif; overflow-x: hidden; color: var(--text-color); }
        
#app {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    justify-items: center;
    gap: 35px; /* Aumenta este valor para separar más las tarjetas entre sí */
    padding-top: 100px;
    padding-bottom: 50px;
}


        
        #bg-image { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            object-fit: cover; z-index: -1; background-image: var(--bg-img);
            background-size: cover; background-position: center;
        }

        .glass-header { 
            grid-column: 1 / -1;
            position: fixed; top: 0; width: 100%; height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; box-sizing: border-box; z-index: 100;
        }

        .custom-dropdown { position: relative; cursor: pointer; }
        .lang-display { background: rgba(255, 255, 255, 0.2); padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; }
        .dropdown-menu {
            position: absolute; top: 40px; right: 0; background: var(--leng-bkg);
            border-radius: 12px; width: 100px; display: none; flex-direction: column; z-index: 999;
        }
        .lang-option { padding: 10px; text-align: center; border-bottom: 1px solid #333; }

        .theme-switch { width: 50px; height: 25px; background: rgba(255, 255, 255, 0.2); border-radius: 25px; cursor: pointer; display: flex; align-items: center; padding: 0 5px; }
        .dark-theme-active { background: #333; justify-content: flex-end; }

        .card { 
    margin-bottom: -50px !important; /* Acerca el botón a la tarjeta */
    width: 300px; height: 150px;
    display: flex; flex-direction: column; align-items: center; 
    justify-content: center;
}
        
.glass-btn { 
    margin-top: 20px !important; /* Espacio real entre el botón y la tarjeta de abajo */
    width: 150px; height: 45px; z-index: 10; cursor: pointer; color: var(--text-color); 
    font-weight: bold; display: flex; align-items: center; justify-content: center; 
    border-radius: 25px; background: rgba(255, 255, 255, 0.2); text-decoration: none;
}

        .social-bar {
            grid-column: 1 / -1; margin-top: 20px;
            width: 250px !important; height: 60px !important; display: flex !important;
            justify-content: center !important; align-items: center !important;
            gap: 15px !important; margin-top: 40px !important; background: rgba(255, 255, 255, 0.1) !important;
        }

        .social-btn { cursor: pointer; font-size: 1.8rem; color: var(--text-color); transition: transform 0.2s; }
        .social-btn:hover { transform: scale(1.2); }

        canvas { pointer-events: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <div id="bg-image"></div>
        <header class="glass-header" data-config='{"blurAmount": 1, "cornerRadius": 20}'>
            <span id="header-text" style="font-weight: bold;">Samu330 🌮</span>
            <div style="display: flex; gap: 10px;">
                <div class="custom-dropdown">
                    <div id="lang-btn" class="lang-display">ES <i class="fas fa-chevron-down"></i></div>
                    <div id="lang-menu" class="dropdown-menu">
                        <div class="lang-option" data-lang="es">Español</div>
                        <div class="lang-option" data-lang="en">English</div>
                    </div>
                </div>
                <div id="theme-toggle" class="theme-switch"><i id="theme-icon" class="fa-solid fa-sun" style="color: #ffd700;"></i></div>
            </div>
        </header>
        
        <div class="card" data-config='{"blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}'><i class="fab fa-whatsapp" style="font-size: 3rem"></i><h1>Whatsapp</h1></div>
    <a href="#" class="glass-btn">Generar</a>
    
    <div class="card" data-config='{"blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}'><i class="fas fa-train" style="font-size: 3rem"></i><h1>Subway</h1></div>
    <a href="#" class="glass-btn">Jugar</a>
        
        <div class="glass-btn social-bar">
    <div class="social-btn" data-url="https://facebook.com"><i class="fab fa-facebook-f"></i></div>
    <div class="social-btn" data-url="https://instagram.com"><i class="fab fa-instagram"></i></div>
    <div class="social-btn" data-url="https://wa.me/"><i class="fab fa-whatsapp"></i></div>
    <div class="social-btn" data-url="https://tiktok.com"><i class="fab fa-tiktok"></i></div>
</div>


    </div>

    <script type="module">
        import { LiquidGlass } from 'https://cdn.jsdelivr.net/npm/@ybouane/liquidglass/dist/index.js';

        let liquidInstance = null;
        const translations = {
            es: { header: "Samu330 🌮", t1: "Título 1", s1: "Subtítulo interesante.", t2: "Título 2", s2: "Otro texto genial.", btn: "Click" },
            en: { header: "Samu330 🌮", t1: "Title 1", s1: "Interesting subtitle.", t2: "Title 2", s2: "Another cool text.", btn: "Click" }
        };

async function initEffects() {
    document.querySelectorAll('canvas').forEach(c => c.remove());
    await new Promise(r => setTimeout(r, 300));
    
    liquidInstance = await LiquidGlass.init({
        root: document.querySelector('#app'),
        // Aquí le decimos que agarre todos los elementos que cumplen la regla
        glassElements: document.querySelectorAll('#app > .card, #app > .glass-btn, #app > .glass-header'),
    });
}




    
        // Click Redes Sociales
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', () => window.open(btn.getAttribute('data-url'), '_blank'));
        });

        // Lógica de Menús
        const langBtn = document.getElementById('lang-btn');
        const langMenu = document.getElementById('lang-menu');
        langBtn.addEventListener('click', () => {
            const isMenuVisible = langMenu.style.display === 'flex';
            langMenu.style.display = isMenuVisible ? 'none' : 'flex';
            langBtn.querySelector('i').className = isMenuVisible ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
        });

        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', async (e) => {
                const lang = e.target.getAttribute('data-lang');
                const currentIconClass = langBtn.querySelector('i').className;
                langBtn.innerHTML = `${lang.toUpperCase()} <i class="${currentIconClass}"></i>`;
                langMenu.style.display = 'none';
                langBtn.querySelector('i').className = 'fas fa-chevron-down';
                
                document.getElementById('header-text').innerText = translations[lang].header;
                document.getElementById('title-1').innerText = translations[lang].t1;
                document.getElementById('sub-1').innerText = translations[lang].s1;
                document.getElementById('title-2').innerText = translations[lang].t2;
                document.getElementById('sub-2').innerText = translations[lang].s2;
                document.querySelectorAll('.glass-btn:not(.social-bar)').forEach(b => b.innerText = translations[lang].btn);
                
                await initEffects();
            });
        });

        document.getElementById('theme-toggle').addEventListener('click', async () => {
            document.body.classList.toggle('dark-theme');
            document.getElementById('theme-toggle').classList.toggle('dark-theme-active');
            const icon = document.getElementById('theme-icon');
            icon.className = document.body.classList.contains('dark-theme') ? "fa-solid fa-moon" : "fa-solid fa-sun";
            await initEffects();
        });

        window.addEventListener('load', initEffects);
        window.addEventListener('scroll', () => { 
            requestAnimationFrame(() => { if(liquidInstance) liquidInstance.markChanged(); });
        }, { passive: true });
    </script>
</body>
</html>
