        :root {
            --text-primary: #1e293b; 
            --text-secondary: #64748b;

        html, body { 
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0f172a;

            -webkit-text-size-adjust: 100% !important;

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Roboto', sans-serif; 
            color: var(--text-primary);
            overflow-x: hidden;

        /* FONDO ÚNICO Y FIJO EN TODA LA PÁGINA (No se repite) */
        .bg-fixed-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            object-fit: cover;
            pointer-events: none;
        }

        /* CONTENEDOR RAÍZ GRID */
        #app-root {
            position: relative;
            min-height: 100vh;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 110px 20px 40px 20px;
            align-content: start;
        }

        /* HEADER FLOTANTE CON EFECTO GLASS ESTÁTICO */
        .app-bar {
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid var(--card-border);
            grid-column: 1 / -1;
        }
        .my-glass-fixed {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }

        .switcher-wrap { position: relative; z-index: 10; }
        .switcher {
            border: none; padding: 4px; background: rgba(0, 0, 0, 0.15);
            border-radius: 30px; display: inline-flex; position: relative;
            align-items: center; gap: 4px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        body[data-theme="dark"] .switcher { background: rgba(255, 255, 255, 0.1); }
        .switcher__legend { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .switcher__option { position: relative; display: flex; align-items: center; justify-content: center; width: 38px; height: 34px; cursor: pointer; z-index: 2; }
        .switcher__input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; }
        .switcher__icon { width: 20px; height: 20px; z-index: 3; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; }
        
        .switcher__bg {
            position: absolute; top: 4px; left: 4px; width: 38px; height: 34px;
            background: var(--accent); border-radius: 24px; z-index: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body:has(.switcher__input[value="light"]:checked) .switcher__bg { transform: translateX(0px); background: #4f46e5; }
        body:has(.switcher__input[value="dark"]:checked) .switcher__bg { transform: translateX(42px); background: #fcd34d; }

        /* TARJETAS LIMPIAS (Solo transparencia y Blur CSS estándar) */
        .card-with-icon { 
            padding: 40px 24px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 5;
            transition: transform 0.25s ease;
        }
        .card-with-icon:hover { transform: translateY(-5px); }

        .card-icon { font-size: 3rem; color: var(--accent); margin-bottom: 16px; }
        .card-title { font-size: 1.3rem; margin-bottom: 20px; font-weight: 600; }
        .card-buttons { display: flex; justify-content: center; width: 100%; }

        /* BOTONES CON EFECTO LÍQUIDO PERFECTO (No se mueven al scrolear) */
        .neumo-button {
            color: var(--text-primary) !important;
            border: none;

            font-weight: 500; 
            cursor: pointer;
            text-decoration: none; 
            display: inline-block;
            text-align: center;

        }
        body[data-theme="dark"] .neumo-button { color: #ffffff !important; }

        /* DOCK DE CONTACTOS INFERIOR (Glass Estático) */

            display: flex;
            gap: 18px;
            padding: 16px 26px;

        .dock-link {

            color: var(--text-primary); font-size: 1.5rem; text-decoration: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);

        }
        body[data-theme="dark"] .dock-link { background: rgba(0, 0, 0, 0.2); }
        .dock-link:hover { background-color: var(--accent); color: #fff; }

        /* FOOTER */

            grid-column: 1 / -1;
            padding: 10px 20px; 
            text-align: center; 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            z-index: 4; 
        }
    </style>
</head>

    <script type="module">
        import { LiquidGlass } from 'https://cdn.jsdelivr.net/npm/@ybouane/liquidglass/dist/index.js';

        let glassInstance = null;

        // Fija la posición matemática de los botones WebGL sobre sus padres CSS al scrolear
        function updateGlassLayout() {
            if (glassInstance) glassInstance.markChanged();
        }

        async function initLiquidEffect() {
            if (glassInstance) {
                try { glassInstance.destroy(); } catch(e){}
                glassInstance = null;
            }

            const rootEl = document.querySelector('#app-root');
            
            // Reestructurador dinámico automático:
            // LiquidGlass exige que sus elementos objetivos sean hijos directos del nodo root.
            // Los movemos temporalmente para inicializar el WebGL y CSS los fija en su posición original.
            const glassElements = document.querySelectorAll('.full-glass-el');
            glassElements.forEach(el => {
                rootEl.appendChild(el);
                el.style.position = 'absolute'; 
            });

            if (glassElements.length > 0) {
                liquidInstance = await LiquidGlass.init({
                    root: rootEl,
                    glassElements: Array.from(glassElements),
                    defaults: { specular: 0.03, fresnel: 0.95 }
                }).catch(() => {});

                // Sincronización continua de posición al scrolear
                window.addEventListener('scroll', updateGlassLayout, { passive: true });
                window.addEventListener('resize', updateGlassLayout);
                
                // Disparo inicial de sincronización
                updateGlassLayout();
            }
        }

        window.triggerGlassRefresh = function(newImgUrl) {
            const bgImg = document.getElementById('bgImage');
            if(bgImg) {
                bgImg.src = newImgUrl;
                if(glassInstance) glassInstance.markChanged();
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const activeInput = document.querySelector(`.switcher__input[value="${savedTheme}"]`);
            if (activeInput) activeInput.checked = true;
            document.body.dataset.theme = savedTheme;
            
            // Setear src de imagen inicial
            const bgImg = document.getElementById('bgImage');
            bgImg.src = savedTheme === 'light' 
                ? 'https://images-ng.pixai.art/gi/orig/c6e93e74-48ab-4d16-a93c-cf5c5a0f68cd' 
                : 'https://moewalls.com/wp-content/uploads/2026/06/boa-hancock-starry-night-sky-one-piece-thumb.jpg';

            // Pequeño retardo de seguridad para que el DOM se asiente antes del WebGL
            setTimeout(initLiquidEffect, 150);
        });
    </script>

    <script>
        function updateTheme(themeName) {
            document.body.dataset.theme = themeName;
            localStorage.setItem('theme', themeName);
            
            const nextBg = themeName === 'light' 
                ? 'https://images-ng.pixai.art/gi/orig/c6e93e74-48ab-4d16-a93c-cf5c5a0f68cd' 
                : 'https://moewalls.com/wp-content/uploads/2026/06/boa-hancock-starry-night-sky-one-piece-thumb.jpg';
            
            if (typeof window.triggerGlassRefresh === 'function') {
                window.triggerGlassRefresh(nextBg);
            }
        }
        
        document.querySelectorAll('.switcher__input').forEach(input => {
            input.addEventListener('change', (e) => {
                window.updateTheme(e.target.value);
            });
        });
    </script>
