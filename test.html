<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGlass Draggable</title>
    <style>
        body, html { margin: 0; padding: 0; overflow-x: hidden; }

        #app {
            position: relative;
            width: 100vw;
            height: 200vh; /* Altura para scroll */
            padding: 50px;
            box-sizing: border-box;
        }

        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* Elementos más pequeños */
        .glass {
            width: 150px;
            height: 150px;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: grab; /* Indica que se puede arrastrar */
        }
    </style>
</head>
<body>

    <div id="app">
        <img id="bg-image" src="https://images-ng.pixai.art/gi/orig/c6e93e74-48ab-4d16-a93c-cf5c5a0f68cd" alt="Fondo">

        <div class="glass" data-config='{"blurAmount": 0, "cornerRadius": 40, "floating": true}'>
            <h3>Arrástrame</h3>
        </div>

        <div class="glass" data-config='{"brightness": -0.2, "blurAmount": 0.3, "cornerRadius": 20, "floating": true}'>
            <h3>Yo también</h3>
        </div>

        <div class="glass" data-config='{"button": true, "cornerRadius": 20, "floating": true}'>
            <h3>Click & Drag</h3>
        </div>
    </div>

<script type="module">
    import { LiquidGlass } from 'https://cdn.jsdelivr.net/npm/@ybouane/liquidglass/dist/index.js';

    window.addEventListener('load', async () => {
        const instance = await LiquidGlass.init({
            root: document.querySelector('#app'),
            glassElements: document.querySelectorAll('.glass'),
        });

        // REFRESH EN SCROLL:
        // Cada vez que el usuario haga scroll, marcamos como cambiado
        window.addEventListener('scroll', () => {
            instance.markChanged(); 
        }, { passive: true });
    });
</script>

</body>
</html>
