<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samu330</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/4663/4663426.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos base */
        :root { --bg-primary: #f0f0f0; --text-primary: #2d2d2d; --accent: #667eea; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-primary); color: var(--text-primary); margin: 0; }
        
        /* Contenedor para LiquidGlass */
        #glass-root {
            position: relative;
            padding-top: 120px;
            min-height: 100vh;
        }

        /* Estilo para las tarjetas */
        .glass {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            border-radius: 32px !important;
            padding: 40px;
            margin: 20px;
            text-align: center;
        }

        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; max-width: 1000px; margin: 0 auto;
        }

        .card-with-icon { background: var(--bg-card); border-radius: 32px; padding: 40px; }
        .card-icon { font-size: 3rem; color: var(--accent); margin-bottom: 20px; }
        .neumo-button { display: inline-block; padding: 12px 24px; background: var(--accent); color: white; border-radius: 20px; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="glass-root">
        <div class="cards-grid">
            <div class="card-with-icon glass" data-config='{"blurAmount": 0.3, "cornerRadius": 32}'>
                <i class="fa-brands fa-whatsapp card-icon"></i>
                <h3>Whatsapp Fake</h3>
                <a href="./whatsapp/" class="neumo-button">Generar chats</a>
            </div>

            <div class="card-with-icon glass" data-config='{"blurAmount": 0.3, "cornerRadius": 32}'>
                <i class="fas fa-train-subway card-icon"></i>
                <h3>Subway Surfers</h3>
                <a href="./games/surf" class="neumo-button">Jugar</a>
            </div>

            <div class="card-with-icon glass" data-config='{"blurAmount": 0.3, "cornerRadius": 32}'>
                <i class="fas fa-arrow-pointer card-icon"></i>
                <h3>Cactus Clicker</h3>
                <a href="./Cactus/" class="neumo-button">Jugar</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { LiquidGlass } from 'https://cdn.jsdelivr.net/npm/@ybouane/liquidglass/dist/index.js';

        async function start() {
            try {
                await LiquidGlass.init({
                    root: document.querySelector('#glass-root'),
                    glassElements: document.querySelectorAll('.glass'),
                });
            } catch (e) {
                console.error("Error al cargar LiquidGlass:", e);
            }
        }
        start();
    </script>
</body>
</html>
