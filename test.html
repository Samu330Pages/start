<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samu330 Web</title>
    <style>
      :root {
        --bg-img: url('./main/images/light.jpg');
        --card-bg: rgba(255, 255, 255, 0.15);
        --text-color: black;
        --leng-bkg: rgba(250, 250, 250, 0.8);
      }

      .dark-theme {
        --bg-img: url('./main/images/dark.jpg');
        --card-bg: rgba(0, 0, 0, 0.4);
        --text-color: #f0f0f0;
        --leng-bkg: rgba(0, 0, 0, 0.8)
      }

      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      button:focus,
      .lang-display:focus,
      .theme-switch:focus,
      .social-btn:focus {
        outline: none !important;
        box-shadow: none !important;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        overflow-x: hidden;
        color: var(--text-color);
        background: #000;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 80px 20px;
        gap: 25px;
        min-height: 100vh;
      }

      #bg-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -1;
        background-image: var(--bg-img);
        background-size: cover;
        background-position: center;
      }

      .glass-header {
        grid-column: 1 / -1;
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 25px;
        box-sizing: border-box;
        z-index: 100;
      }

      .custom-dropdown {
        position: relative;
        cursor: pointer;
      }

      .lang-display {
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.9rem;
      }

      .dropdown-menu {
        position: absolute;
        top: 40px;
        right: 0;
        background: var(--leng-bkg);
        border-radius: 12px;
        width: 100px;
        display: none;
        flex-direction: column;
        z-index: 999;
      }

      .lang-option {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #333;
      }

      .theme-switch {
        width: 50px;
        height: 25px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        cursor: pointer;
        display: flex;
        align-items: center;
        padding: 0 5px;
      }

      .dark-theme-active {
        background: #333;
        justify-content: flex-end;
      }

      .card {
        width: 20rem;
        height: 13rem;
        background: var(--card-bg);
        border-radius: 65px;
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .glass-btn {
        margin-top: 20px !important;
        width: 150px;
        height: 45px;
        z-index: 10;
        cursor: pointer;
        color: var(--text-color);
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.2);
        text-decoration: none;
      }

      .social-bar {
        grid-column: 1 / -1;
        margin-top: 20px;
        width: 250px !important;
        height: 60px !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        gap: 15px !important;
        margin-top: 40px !important;
      }

      .social-btn {
        cursor: pointer;
        font-size: 1.8rem;
        color: var(--text-color);
        transition: transform 0.2s;
      }

      .social-btn:hover {
        transform: scale(1.2);
      }

      canvas {
        pointer-events: none !important;
      }

      .button {
        cursor: pointer;
        padding: 0.4em;
        font-size: 0.9em;
        width: 6em;
        aspect-ratio: 1/0.25;
        color: white;
        background: #010101;
        background-size: cover;
        background-blend-mode: overlay;
        border-radius: 0.8em;
        outline: 0.1em solid #353535;
        border: 0;
        box-shadow: 0 0 1em 1em rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease-in-out;
        position: relative;
      }

      .button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 1em 0.45em rgba(0, 0, 0, 0.1);
        background: linear-gradient(45deg, #212121, #252525);
        background: radial-gradient(circle at bottom,
            rgba(50, 100, 180, 0.5) 10%,
            #212121 70%);
        outline: 0;
      }

      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #333;
        border-top: 5px solid #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
    </div>
    <div id="app">
      <div id="bg-image"></div>
      <header class="glass-header" data-config='{"blurAmount": 0, "cornerRadius": 20, "chromAberration": 0.2, "refraction": 1, "zRadius": 10}'>
        <span id="header-text" style="font-weight: bold;">Samu330 🌮</span>
        <div style="display: flex; gap: 10px;">
          <div class="custom-dropdown">
            <div id="lang-btn" class="lang-display">
              <i class="fas fa-language"></i>
              <span id="lang-text" style="margin: 0 5px;">ES</span>
                
              <i class="fas fa-chevron-down" id="icon-down"></i>
              <i class="fas fa-chevron-up" id="icon-up" style="display: none;"></i>
            </div>
            <div id="lang-menu" class="dropdown-menu">
              <div class="lang-option" data-lang="es">Español</div>
              <div class="lang-option" data-lang="en">English</div>
              <div class="lang-option" data-lang="in">Indo</div>
              <div class="lang-option" data-lang="ch">汉语</div>
            </div>
          </div>
          <div id="theme-toggle" class="theme-switch">
            <i id="theme-icon" class="fa-solid fa-sun" style="color: #ffd700;"></i>
          </div>
        </div>
      </header>
      <div class="card" data-config='{"blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}'>
        <i class="fab fa-whatsapp" style="font-size: 3rem"></i>
        <h1 id="tt-WAG">WhatsApp Falso</h1>
        <button id="btn-WAG" class="button" href="#">Generar</button>
      </div>
      <div class="card" data-config='{"blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}'>
        <i class="fas fa-train" style="font-size: 3rem"></i>
        <h1 id="tt-SF">Subway Surfers</h1>
        <button id="btn-SF" class="button" href="#">Jugar</button>
      </div>
      <div class="card" data-config='{"blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}'>
        <i class="fas fa-gamepad" style="font-size: 3rem"></i>
        <h1 id="tt-MG">Más juegos...</h1>
        <button id="btn-MG" class="button" href="./games/more">Entrar</button>
      </div>
      <div class="glass-btn social-bar">
        <div class="social-btn" data-url="https://facebook.com">
          <i class="fab fa-facebook-f"></i>
        </div>
        <div class="social-btn" data-url="https://instagram.com">
          <i class="fab fa-instagram"></i>
        </div>
        <div class="social-btn" data-url="https://wa.me/">
          <i class="fab fa-whatsapp"></i>
        </div>
        <div class="social-btn" data-url="https://tiktok.com">
          <i class="fab fa-tiktok"></i>
        </div>
      </div>
    </div>
    <script type="module">
      import {
        LiquidGlass
      } from './main/js/liquidglass.js';
      let liquidInstance = null;
      const backgrounds = ['./main/images/light.jpg', './main/images/dark.jpg'];
        
      function preloadImages(array) {
        array.forEach(src => {
          new Image().src = src;
        });
      }
        
      async function initEffects() {
        updateCardConfigs();
        document.querySelectorAll('canvas').forEach(c => c.remove());
        liquidInstance = await LiquidGlass.init({
          root: document.querySelector('#app'),
          glassElements: document.querySelectorAll('#app > .card, #app > .glass-header, #app > .social-bar'),
        });
          
        const loader = document.getElementById('loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      }
        
      window.addEventListener('load', async () => {
        preloadImages(backgrounds);
          
        await new Promise(r => setTimeout(r, 300));
        await initEffects();
      });

        //TRADUCCION xD
      const translations = {
        es: {
          header: "Samu330 🌮",
          ttWAG: "WhatsApp Falso",
          ttSF: "Subway Surfers",
          ttMG: "Más juegos...",
          btnSF: "Entrar",
          btnWAG: "Generar",
          btnMG: "Entrar",
        },
        en: {
          header: "Samu330 🌭",
          ttWAG: "WhatsApp Fake",
          ttSF: "Subway Surfers",
          ttMG: "More games...",
          btnSF: "Play",
          btnWAG: "Generate",
          btnMG: "Enter",
        },
        in : {
          header: "Samu330 🇮🇩",
          ttWAG: "WhatsApp Palsu",
          ttSF: "Subway Surfers",
          ttMG: "Permainan lainnya...",
          btnSF: "Bermain",
          btnWAG: "Buat gambar",
          btnMG: "Memasuki",
        },
        ch: {
          header: "Samu330 🐉",
          ttWAG: "虚假 WhatsApp",
          ttSF: "地铁跑酷",
          ttMG: "其他游戏……",
          btnSF: "开始游戏",
          btnWAG: "生成照片",
          btnMG: "进入",
        },
      };
      document.querySelectorAll('.social-btn').forEach(btn => {
        btn.addEventListener('click', () => window.open(btn.getAttribute('data-url'), '_blank'));
      });
      document.getElementById('lang-btn').addEventListener('click', () => {
        const menu = document.getElementById('lang-menu');
        const iconDown = document.getElementById('icon-down');
        const iconUp = document.getElementById('icon-up');
        const isVisible = menu.style.display === 'flex';
        menu.style.display = isVisible ? 'none' : 'flex';
          
        iconDown.style.display = isVisible ? 'inline-block' : 'none';
        iconUp.style.display = isVisible ? 'none' : 'inline-block';
      });
        
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', async (e) => {
          const lang = e.target.getAttribute('data-lang');
          document.getElementById('lang-text').innerText = lang.toUpperCase();
            
          document.getElementById('header-text').innerText = translations[lang].header;
          document.getElementById('tt-WAG').innerText = translations[lang].ttWAG;
          document.getElementById('tt-SF').innerText = translations[lang].ttSF;
          document.getElementById('tt-MG').innerText = translations[lang].ttMG;
          document.getElementById('btn-SF').innerText = translations[lang].btnSF;
          document.getElementById('btn-WAG').innerText = translations[lang].btnWAG;
          document.getElementById('btn-MG').innerText = translations[lang].btnMG;
            
          document.getElementById('lang-menu').style.display = 'none';
          document.getElementById('icon-down').style.display = 'inline-block';
          document.getElementById('icon-up').style.display = 'none';
          await initEffects();
        });
      });
        //

        //TEMA DE LAS CARDS
      const cardConfigs = {
        light: '{"blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}',
        dark: '{"brightness": -0.3, "blurAmount": 0.40, "chromAberration": 0.2, "refraction": 1, "shadowOpacity": 0.70}'
      };
        //

      function updateCardConfigs() {
        const isDark = document.body.classList.contains('dark-theme');
        const newConfig = isDark ? cardConfigs.dark : cardConfigs.light;
        document.querySelectorAll('.card').forEach(card => {
          card.setAttribute('data-config', newConfig);
        });
      }

        //FUNCION DE TEMAS
      document.getElementById('theme-toggle').addEventListener('click', async () => {
        document.body.classList.toggle('dark-theme');
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.classList.toggle('dark-theme-active');
        const icon = toggleBtn.querySelector('i');
        if (icon) {
          const isDark = document.body.classList.contains('dark-theme');
          icon.className = isDark ? "fa-solid fa-moon" : "fa-solid fa-sun";
          if (window.FontAwesome) window.FontAwesome.dom.i2svg();
        }
        await initEffects();
      });
        //

        //PARA QUE LA ANIMACION SIGA AL HACER SCROLL
      window.addEventListener('scroll', () => {
        requestAnimationFrame(() => {
          if (liquidInstance) liquidInstance.markChanged();
        });
      }, {
        passive: true
      });
    </script>
    <script src="https://kit.fontawesome.com/1e415e3bac.js" crossorigin="anonymous"></script>
  </body>
</html>
