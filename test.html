<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Esta es la clase que da el efecto cristal "líquido" real */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            width: 90%;
            max-width: 300px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h3>Whatsapp Fake</h3>
        <p>Efecto cristal nativo</p>
    </div>
    <div class="glass-card">
        <h3>Subway Surfers</h3>
        <p>Efecto cristal nativo</p>
    </div>
</body>
</html>
